    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: calc(var(--nav-h) + 40px) 24px 80px;
    }
    .error-code {
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--indigo), #00D4C8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -.04em;
      margin-bottom: 8px;
    }
    .error-sam {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 28px;
      display: block;
      animation: samBounce 2.4s ease-in-out infinite;
    }
    @keyframes samBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    .error-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 32px;
    }
    .error-quick {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 24px;
    }
    .error-quick a {
      font-size: 13px;
      color: var(--text-light);
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid var(--card-border);
      border-radius: 100px;
      transition: all .15s;
    }
    .error-quick a:hover { color: var(--indigo); border-color: var(--indigo); }
